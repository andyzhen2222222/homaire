# homaire.eu — 将整站（静态 + /api）反代到 Node (npm run start, 默认 3000)
# 安装: sudo cp deploy/nginx-homaire.conf /etc/nginx/sites-available/homaire
#       sudo ln -sf /etc/nginx/sites-available/homaire /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 前置: 在服务器上 git pull && npm ci && npm run deploy:prepare && npm run start
# 建议用 systemd/pm2 守护进程，并挂载卷持久化 SQLite: /app/data 或 ./data

upstream homaire_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name homaire.eu www.homaire.eu;

    client_max_body_size 32m;
    root /var/www/homaire/dist;

    # 商品快照（API 不可用时的兜底）；须在 SPA try_files 之前
    location = /feishu-bitable-db-v1.json {
        default_type application/json;
        gzip on;
        try_files $uri =404;
    }

    # API 必须进 Node，不能落到静态 index.html
    location /api/ {
        proxy_pass http://homaire_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://homaire_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# 若已配置 Certbot，可在同一 server 块上增加 listen 443 ssl 与证书路径。
